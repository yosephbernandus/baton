orchestrator:
  runtime: claude-code
  model: sonnet

runtimes:
  mock:
    command: "./testdata/mock-runtime.sh"
    model_flag: "-m"
    prompt_flag: "-p"
    context_flag: "--files"
    workdir: "inherit"
    models:
      - test
  bash-mock:
    command: "bash"
    model_flag: ""
    prompt_flag: "-c"
    context_flag: ""
    workdir: "inherit"
    models:
      - test

defaults:
  runtime: mock
  model: test

clarification_patterns:
  - "CLARIFICATION_NEEDED"
  - "I'm not sure"

clarification_exit_code: 10

event_log: ".baton/events.ndjson"
task_dir: ".baton/tasks"
result_dir: ".baton/results"
spec_dir: ".baton/specs"
